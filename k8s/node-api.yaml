apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-api
  namespace: onecont

spec:
  replicas: 1

  selector:
    matchLabels:
      app: node-api

  template:
    metadata:
      labels:
        app: node-api

    spec:
      containers:
      - name: node-api
        image: api-node-teste:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 3000

---

apiVersion: v1
kind: Service

metadata:
  name: node-api
  namespace: onecont

spec:
  selector:
    app: node-api

  ports:
  - port: 8080
    targetPort: 3000

  type: ClusterIP